<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Audience QI26 | ASAA</title>
    <meta name="theme-color" content="#03251d" />
    <link rel="icon" href="assets/logo.jpg" type="image/jpeg" />
    <script src="qi26-regie-guard.js" defer></script>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background:
          linear-gradient(120deg, rgba(3, 37, 29, 0.98), rgba(6, 71, 51, 0.92)),
          #03251d;
        color: white;
        font-family: Manrope, "Segoe UI", system-ui, sans-serif;
      }
      main {
        width: min(1240px, calc(100% - 32px));
        min-height: 100vh;
        margin: 0 auto;
        display: grid;
        align-content: center;
        gap: 28px;
        padding: 32px 0;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .brand img {
        width: 64px;
        height: 64px;
        border: 2px solid #c99a35;
        border-radius: 12px;
        object-fit: cover;
      }
      .kicker {
        margin: 0;
        color: #ffe7a3;
        font-size: 0.8rem;
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      h1 {
        margin: 4px 0 0;
        font-size: clamp(2rem, 5vw, 4.8rem);
        line-height: 1;
      }
      .updated {
        color: rgba(255, 255, 255, 0.72);
        font-weight: 800;
      }
      .header-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
      }
      .screen-toggle {
        min-height: 42px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        padding: 10px 14px;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }
      .screen-link {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        padding: 10px 14px;
        text-decoration: none;
        font: inherit;
        font-weight: 900;
      }
      .screen-toggle:hover {
        background: white;
        color: #03251d;
      }
      .screen-link:hover {
        background: white;
        color: #03251d;
      }
      .stats {
        display: grid;
        grid-template-columns: 1.4fr 1fr 1fr 1fr;
        gap: 16px;
      }
      .stat,
      .panel {
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        padding: clamp(18px, 3vw, 30px);
      }
      .stat strong {
        display: block;
        color: white;
        font-size: clamp(2.5rem, 8vw, 7.2rem);
        line-height: 0.95;
        font-variant-numeric: tabular-nums;
      }
      .stat span {
        display: block;
        margin-top: 10px;
        color: rgba(255, 255, 255, 0.76);
        font-size: 1rem;
        font-weight: 900;
      }
      .grid {
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 16px;
      }
      h2 {
        margin: 0 0 14px;
        color: #ffe7a3;
        font-size: clamp(1.3rem, 3vw, 2.2rem);
      }
      .communes {
        display: grid;
        gap: 10px;
      }
      .row {
        display: grid;
        grid-template-columns: minmax(120px, 180px) 1fr 64px;
        gap: 12px;
        align-items: center;
      }
      .bar {
        height: 14px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
      }
      .bar span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: #c99a35;
      }
      .row strong {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .qr {
        width: min(260px, 100%);
        border: 10px solid white;
        border-radius: 8px;
        background: white;
      }
      .qr-panel {
        display: grid;
        justify-items: center;
        text-align: center;
      }
      .qr-panel p {
        color: rgba(255, 255, 255, 0.76);
        line-height: 1.7;
      }
      body.big-screen main {
        width: min(1500px, calc(100% - 40px));
      }
      body.big-screen .stats {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      body.big-screen .stat strong {
        font-size: clamp(4rem, 11vw, 10rem);
      }
      body.big-screen .stat span {
        font-size: clamp(1.2rem, 2vw, 1.8rem);
      }
      body.big-screen h1 {
        font-size: clamp(3rem, 6vw, 6.5rem);
      }
      body.big-screen .grid {
        display: none;
      }
      @media (max-width: 900px) {
        .stats,
        .grid {
          grid-template-columns: 1fr;
        }
        header {
          align-items: flex-start;
          flex-direction: column;
        }
        .row {
          grid-template-columns: 1fr;
        }
        .row strong {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="brand">
          <img src="assets/logo.jpg" alt="Logo ASAA" />
          <div>
            <p class="kicker">Finale du Quiz Islamique 2026</p>
            <h1>Audience QI26</h1>
          </div>
        </div>
        <div class="header-actions">
          <button class="screen-toggle" type="button" data-big-screen>Grande police</button>
          <a class="screen-link" href="/api/admin/qi26-audience/export.csv">CSV audience</a>
          <a class="screen-link" href="admin.html#qi26AudienceSection">Rapport PDF</a>
          <a class="screen-link" href="/api/admin/qi26-engagement/export">Interactions</a>
          <div class="updated" data-updated>Synchronisation...</div>
        </div>
      </header>

      <section class="stats" aria-label="Compteurs audience">
        <div class="stat"><strong data-total>0</strong><span>Total public</span></div>
        <div class="stat"><strong data-brothers>0</strong><span>Frères</span></div>
        <div class="stat"><strong data-sisters>0</strong><span>Sœurs</span></div>
        <div class="stat"><strong data-communes>0</strong><span>Communes</span></div>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>Communes représentées</h2>
          <div class="communes" data-commune-list>Aucune donnée pour le moment.</div>
        </article>
        <aside class="panel qr-panel">
          <h2>Enregistrement public</h2>
          <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=12&data=https%3A%2F%2Fasaaofficiel.vercel.app%2Faudience-qi26.html" alt="QR code Audience QI26" />
          <p>Scanner le QR code pour enregistrer sa présence.</p>
        </aside>
      </section>
    </main>
    <script>
      const total = document.querySelector('[data-total]');
      const brothers = document.querySelector('[data-brothers]');
      const sisters = document.querySelector('[data-sisters]');
      const communes = document.querySelector('[data-communes]');
      const communeList = document.querySelector('[data-commune-list]');
      const updated = document.querySelector('[data-updated]');
      const bigScreenButton = document.querySelector('[data-big-screen]');

      function setBigScreen(enabled) {
        document.body.classList.toggle('big-screen', enabled);
        if (bigScreenButton) bigScreenButton.textContent = enabled ? 'Affichage normal' : 'Grande police';
        try {
          localStorage.setItem('asaa_qi26_dashboard_big_screen', enabled ? '1' : '0');
        } catch {}
      }

      function escapeHtml(value) {
        return String(value || '').replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        })[char]);
      }

      async function loadStats() {
        try {
          const res = await fetch('/api/qi26/audience/stats', { cache: 'no-store' });
          const data = await res.json();
          const stats = data.stats || {};
          const rows = Array.isArray(stats.byCommune) ? stats.byCommune : [];
          total.textContent = stats.total || 0;
          brothers.textContent = stats.brothers || 0;
          sisters.textContent = stats.sisters || 0;
          communes.textContent = rows.length;
          const max = Math.max(...rows.map((item) => Number(item.total || 0)), 1);
          communeList.innerHTML = rows.length
            ? rows.slice(0, 12).map((item) => {
                const value = Number(item.total || 0);
                const width = Math.max(8, Math.round((value / max) * 100));
                return `<div class="row"><span>${escapeHtml(item.commune || 'Non renseignée')}</span><div class="bar"><span style="width:${width}%"></span></div><strong>${value}</strong></div>`;
              }).join('')
            : 'Aucune donnée pour le moment.';
          updated.textContent = `Mis à jour à ${new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}`;
        } catch {
          updated.textContent = 'Synchronisation indisponible';
        }
      }

      bigScreenButton?.addEventListener('click', () => setBigScreen(!document.body.classList.contains('big-screen')));
      try {
        setBigScreen(localStorage.getItem('asaa_qi26_dashboard_big_screen') === '1');
      } catch {
        setBigScreen(false);
      }
      loadStats();
      window.setInterval(loadStats, 10000);
    </script>
  </body>
</html>
