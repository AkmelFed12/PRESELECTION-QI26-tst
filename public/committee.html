<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASAA Officiel — Comité & Organigramme</title>
    <link rel="icon" href="assets/logo.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="hero">
      <img src="assets/logo.jpg" alt="Logo ASAA" class="logo" />
      <div>
        <h1>Comité & Organigramme</h1>
        <p class="slogan">Association des Serviteurs d'Allah Azawajal</p>
        <p class="subtitle">Équipe dirigeante</p>
      </div>
      <div class="hero-actions">
        <a class="btn outline" href="index.html">Accueil</a>
        <a class="btn outline" href="about.html">À propos</a>
        <a class="btn outline" href="communiques.html">Communiqués</a>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <div class="card-header">
          <h2>Organigramme</h2>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn outline" type="button" id="printCommitteeBtn">Imprimer le comité</button>
            <a class="btn outline" id="downloadCommitteePdf" href="/api/public/committee-pdf" target="_blank" rel="noopener">Télécharger PDF</a>
          </div>
        </div>
        <div id="committeeOrg">Chargement...</div>
      </section>

      <section class="card">
        <h2>Dirigeants & responsables</h2>
        <div id="committeeList">Chargement...</div>
      </section>
    </main>

    <footer>
      <div>Association des Serviteurs d'Allah Azawajal — ASAA</div>
      <div class="footer-meta">
        <span data-footer-address></span>
        <span data-footer-phone></span>
        <span data-footer-email></span>
        <span data-footer-hours></span>
      </div>
      <div class="footer-signature">Designed & Created by LMO Website Services</div>
    </footer>

    <script src="site-content.js"></script>
  </body>
</html>
