<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sponsors — Quiz Islamique 2026</title>
    <link rel="icon" href="assets/logo.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="hero">
      <img src="assets/logo.jpg" alt="Logo" class="logo" />
      <div>
        <h1>Sponsors</h1>
        <p class="subtitle">Partenaires officiels du Quiz Islamique 2026</p>
      </div>
      <div class="hero-actions">
        <a class="btn outline" href="index.html">Accueil</a>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <h2>Nos partenaires</h2>
        <div id="sponsorsList" class="grid-two">Chargement...</div>
      </section>

      <section class="card">
        <h2>Devenir sponsor</h2>
        <form id="sponsorPublicForm" class="form-grid">
          <div><label>Nom du sponsor *</label><input name="name" required /></div>
          <div><label>Contact</label><input name="contactName" /></div>
          <div><label>Email</label><input name="email" type="email" /></div>
          <div><label>Téléphone</label><input name="phone" /></div>
          <div><label>Montant (XOF)</label><input name="amount" type="number" step="0.01" /></div>
          <div><label>Site web</label><input name="website" /></div>
          <div class="full"><label>Logo (URL)</label><input name="logoUrl" /></div>
          <div class="full"><button class="btn-primary" type="submit">Envoyer la demande</button></div>
        </form>
        <p id="sponsorPublicMsg" class="status"></p>
      </section>
    </main>

    <footer>Association des Serviteurs d'Allah Azawajal — Quiz Islamique 2026</footer>
    <script src="sponsors.js"></script>
  </body>
</html>
