<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Quiz Islamique 2026</title>
    <meta name="description" content="Messagerie entre candidats">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <style>
        .messaging-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            height: calc(100vh - 120px);
        }
        .conversations-panel {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            background: white;
        }
        .conversations-header {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            font-weight: bold;
            color: #333;
        }
        .conversations-list {
            flex: 1;
            overflow-y: auto;
        }
        .conversation-item {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .conversation-item:hover {
            background: #f5f5f5;
        }
        .conversation-item.active {
            background: #667eea;
            color: white;
        }
        .conversation-name {
            font-weight: 500;
        }
        .unread-badge {
            display: inline-block;
            background: #ff6b6b;
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: bold;
        }
        .chat-panel {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            background: white;
        }
        .chat-header {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            font-weight: bold;
            color: #333;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            display: flex;
            margin-bottom: 10px;
        }
        .message.sent {
            justify-content: flex-end;
        }
        .message.received {
            justify-content: flex-start;
        }
        .message-bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 12px;
            word-wrap: break-word;
        }
        .message.sent .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.received .message-bubble {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }
        .chat-input {
            padding: 15px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .chat-input button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .chat-input button:hover {
            background: #764ba2;
        }
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
        }
        .no-conversations {
            text-align: center;
            color: #999;
            padding: 30px 15px;
        }
        @media (max-width: 768px) {
            .messaging-container {
                grid-template-columns: 1fr;
                height: auto;
            }
            .conversations-panel {
                display: none;
            }
            .message-bubble {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">ASAA Quiz</a>
            <ul class="nav-menu">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="leaderboard.html">Classement</a></li>
                <li><a href="achievements.html">Badges</a></li>
                <li><a href="messaging.html" class="active">Messages</a></li>
                <li><a href="profile.html">Mon Profil</a></li>
            </ul>
        </div>
    </nav>

    <div class="messaging-container">
        <!-- Conversations List -->
        <div class="conversations-panel">
            <div class="conversations-header">💬 Conversations</div>
            <div id="conversationsList" class="conversations-list">
                <div class="no-conversations">Aucune conversation</div>
            </div>
        </div>

        <!-- Chat Panel -->
        <div class="chat-panel">
            <div id="chatHeader" class="chat-header">Sélectionnez une conversation</div>
            <div id="chatMessages" class="chat-messages">
                <div class="empty-state">Aucun message sélectionné</div>
            </div>
            <div id="chatInput" class="chat-input" style="display:none;">
                <input type="text" id="messageInput" placeholder="Votre message..." maxlength="1000">
                <button id="sendBtn">Envoyer</button>
            </div>
        </div>
    </div>

    <script src="utils.js"></script>
    <script>
        let currentCandidateId = localStorage.getItem('candidateId');
        let selectedConversation = null;

        async function loadConversations() {
            try {
                const response = await fetch(`/api/social/conversations/${currentCandidateId}`);
                const conversations = await response.json();

                const html = conversations.map(conv => `
                    <div class="conversation-item" onclick="selectConversation('${conv.other_user_id}', this)">
                        <div>
                            <div class="conversation-name">${conv.other_user_name || 'Utilisateur'}</div>
                        </div>
                        ${conv.unread_count > 0 ? `<span class="unread-badge">${conv.unread_count}</span>` : ''}
                    </div>
                `).join('');

                document.getElementById('conversationsList').innerHTML = html || '<div class="no-conversations">Aucune conversation</div>';
            } catch (error) {
                console.error(error);
            }
        }

        async function selectConversation(userId, element) {
            selectedConversation = userId;
            
            // Update UI
            document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            document.getElementById('chatHeader').textContent = `Chat avec ${element.querySelector('.conversation-name').textContent}`;
            document.getElementById('chatInput').style.display = 'flex';

            await loadMessages(userId);
        }

        async function loadMessages(userId) {
            try {
                const response = await fetch(`/api/social/messages/${userId}?userId=${currentCandidateId}`);
                const messages = await response.json();

                const html = messages.map(msg => {
                    const isSent = msg.sender_candidate_id === currentCandidateId;
                    const time = new Date(msg.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
                    return `
                        <div class="message ${isSent ? 'sent' : 'received'}">
                            <div>
                                <div class="message-bubble">${escapeHtml(msg.content)}</div>
                                <div class="message-time">${time}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                document.getElementById('chatMessages').innerHTML = html;
                document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
            } catch (error) {
                console.error(error);
                showToast('Erreur lors du chargement des messages', 'error');
            }
        }

        document.getElementById('sendBtn').addEventListener('click', async () => {
            const content = document.getElementById('messageInput').value.trim();
            if (!content) return;

            try {
                const response = await fetch('/api/social/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sender_id: currentCandidateId,
                        recipient_id: selectedConversation,
                        content: content
                    })
                });

                if (response.ok) {
                    document.getElementById('messageInput').value = '';
                    await loadMessages(selectedConversation);
                } else {
                    showToast('Erreur lors de l\'envoi du message', 'error');
                }
            } catch (error) {
                console.error(error);
                showToast('Erreur réseau', 'error');
            }
        });

        // Enter to send
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('sendBtn').click();
            }
        });

        if (currentCandidateId) {
            loadConversations();
            setInterval(loadConversations, 5000); // Refresh every 5 seconds
        } else {
            showToast('Veuillez d\'abord vous inscrire', 'warning');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
