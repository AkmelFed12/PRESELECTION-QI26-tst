<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Résultats — Quiz Islamique 2026</title>
    <link rel="icon" href="assets/logo.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="hero">
      <img src="assets/logo.jpg" alt="Logo" class="logo" />
      <div>
        <h1>Résultats & classement</h1>
        <p class="subtitle">Mise à jour officielle des scores</p>
      </div>
      <div class="hero-actions">
        <a class="btn outline" href="index.html">Accueil</a>
        <a class="btn outline" href="reglement.html">Règlement</a>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <h2>Classement actuel</h2>
        <p class="muted">Les résultats sont publiés par l’administration.</p>
        <div class="form-grid" style="grid-template-columns: repeat(3, minmax(0,1fr)); gap:10px; margin-bottom:12px;">
          <div>
            <label>Auto-refresh</label>
            <select id="refreshSelect">
              <option value="0">Désactivé</option>
              <option value="10000">10s</option>
              <option value="20000" selected>20s</option>
              <option value="60000">60s</option>
            </select>
          </div>
          <div>
            <label>Dernière mise à jour</label>
            <div id="lastUpdate" class="status">-</div>
          </div>
          <div style="display:flex; align-items:flex-end;">
            <button class="btn-primary" id="refreshNow" type="button">Actualiser</button>
          </div>
        </div>
        <div id="rankingWrap" class="status">Chargement...</div>
      </section>
    </main>

    <footer>Association des Serviteurs d'Allah Azawajal — Quiz Islamique 2026</footer>
    <script src="resultats.js"></script>
  </body>
</html>
