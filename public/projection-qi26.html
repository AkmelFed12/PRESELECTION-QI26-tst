<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Régie projection QI26 | ASAA</title>
    <meta name="description" content="Régie de projection ASAA pour la finale du Quiz Islamique 2026." />
    <meta name="theme-color" content="#03251d" />
    <link rel="icon" href="assets/logo.jpg" type="image/jpeg" />
    <script src="qi26-regie-guard.js" defer></script>
    <style>
      :root {
        --green: #03251d;
        --green-2: #064733;
        --gold: #c99a35;
        --line: rgba(255, 255, 255, 0.16);
        --muted: rgba(255, 255, 255, 0.74);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100%;
        background: var(--green);
        color: white;
        font-family: Manrope, "Segoe UI", system-ui, sans-serif;
      }

      body {
        overflow: hidden;
      }

      body.display-view {
        cursor: none;
      }

      .stage {
        height: 100dvh;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        background:
          linear-gradient(120deg, rgba(3, 37, 29, 0.98), rgba(6, 71, 51, 0.94)),
          var(--green);
      }

      body.display-view .topbar,
      body.display-view .sidebar,
      body.display-view .bottombar,
      body.public-mode .topbar,
      body.public-mode .sidebar,
      body.public-mode .bottombar {
        display: none;
      }

      body.display-view .stage,
      body.public-mode .stage {
        grid-template-rows: 1fr;
      }

      body.display-view .workspace,
      body.public-mode .workspace {
        grid-template-columns: 1fr;
        padding: 0;
      }

      body.display-view .screen,
      body.public-mode .screen {
        min-height: 100svh;
        border: 0;
        border-radius: 0;
      }

      body.display-view video::-webkit-media-controls {
        display: none !important;
      }

      body.poster-display .screen {
        grid-template-columns: 1fr;
        place-items: center;
        gap: 0;
        padding: 0;
        background: #020d0a;
      }

      body.poster-display .copy {
        display: none;
      }

      body.poster-display .media-frame,
      body.poster-display .media-frame.portrait {
        width: min(100vw, calc(100dvh * 9 / 16));
        height: 100dvh;
        max-height: 100dvh;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }

      body.card-display .screen {
        grid-template-columns: 1fr;
        place-items: center;
      }

      body.card-display .copy {
        width: min(980px, 92vw);
        text-align: center;
      }

      body.card-display .copy h2 {
        font-size: clamp(3rem, 8vw, 8rem);
      }

      body.home-display .screen {
        grid-template-columns: 1fr;
        place-items: center;
        padding: clamp(14px, 2.4vw, 42px);
      }

      body.home-display .copy {
        width: min(1180px, 94vw);
        text-align: center;
      }

      body.home-display .copy h1 {
        margin-top: clamp(8px, 1.2vw, 18px);
        font-size: clamp(2.6rem, 4.9vw, 5.8rem);
      }

      body.home-display .copy p {
        max-width: 980px;
        margin-inline: auto;
        font-size: clamp(1.05rem, 1.45vw, 1.6rem);
      }

      body.home-display .tags {
        display: none;
      }

      .home-logo {
        width: clamp(62px, 5.4vw, 92px);
        height: clamp(62px, 5.4vw, 92px);
        display: block;
        margin: 0 auto clamp(8px, 1vw, 14px);
        border: 2px solid rgba(201, 154, 53, 0.86);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.24);
        object-fit: cover;
      }

      body.black-screen .blackout {
        display: grid;
      }

      body.day-mode .sidebar .category-button[data-category="finalistPhotos"],
      body.day-mode .sidebar .category-button[data-category="thanks"],
      body.day-mode [data-prev],
      body.day-mode [data-public],
      body.day-mode [data-countdown-start="1"],
      body.day-mode [data-countdown-start="5"],
      body.day-mode [data-fullscreen],
      body.day-mode .bottombar .controls:last-child {
        display: none;
      }

      body.day-mode .sidebar {
        gap: 10px;
      }

      body.day-mode .category-button {
        min-height: 58px;
      }

      .topbar,
      .bottombar {
        position: relative;
        z-index: 4;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px clamp(12px, 1.8vw, 28px);
      }

      .bottombar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        overflow: hidden;
      }

      .brand,
      .status {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .brand img {
        width: 42px;
        height: 42px;
        border: 2px solid rgba(201, 154, 53, 0.74);
        border-radius: 8px;
        object-fit: cover;
      }

      .brand strong,
      .kicker {
        display: block;
        color: #ffe7a3;
        font-size: 0.78rem;
        font-weight: 950;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .brand span,
      .status {
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 850;
      }

      .workspace {
        min-height: 0;
        overflow: hidden;
        display: grid;
        grid-template-columns: minmax(220px, 285px) minmax(0, 1fr);
        gap: clamp(12px, 1.8vw, 24px);
        padding: 0 clamp(12px, 1.8vw, 28px) 8px;
      }

      .panel {
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
      }

      .sidebar {
        align-self: stretch;
        display: grid;
        align-content: start;
        gap: 8px;
        overflow: auto;
        padding: 12px;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.36) transparent;
      }

      .category-button {
        width: 100%;
        min-height: 48px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: white;
        padding: 9px 11px;
        text-align: left;
        font: inherit;
        cursor: pointer;
      }

      .category-button strong {
        display: block;
        font-size: 0.9rem;
        font-weight: 950;
      }

      .category-button span {
        display: block;
        margin-top: 3px;
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 800;
      }

      .category-button.is-active,
      .category-button:hover {
        border-color: rgba(201, 154, 53, 0.76);
        background: rgba(201, 154, 53, 0.18);
      }

      .preview-box {
        display: grid;
        gap: 8px;
        margin-top: 6px;
        border-top: 1px solid var(--line);
        padding-top: 10px;
      }

      .preview-item {
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.14);
        padding: 10px;
      }

      .preview-item span {
        display: block;
        color: #ffe7a3;
        font-size: 0.72rem;
        font-weight: 950;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .preview-item strong {
        display: block;
        margin-top: 4px;
        color: white;
        font-size: 0.96rem;
      }

      .upcoming-list {
        display: grid;
        gap: 6px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .upcoming-list li {
        overflow: hidden;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 850;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tech-status {
        min-height: 18px;
        color: #ffe7a3;
        font-size: 0.78rem;
        font-weight: 850;
        white-space: nowrap;
      }

      .screen {
        position: relative;
        min-height: 0;
        overflow: hidden;
        display: grid;
        grid-template-columns: minmax(0, 0.98fr) minmax(220px, 1.02fr);
        gap: clamp(12px, 1.8vw, 28px);
        align-items: center;
        padding: clamp(12px, 1.8vw, 28px);
      }

      .copy {
        min-width: 0;
      }

      .copy h1,
      .copy h2 {
        margin: 6px 0 0;
        color: white;
        font-size: clamp(1.8rem, 3.7vw, 3.55rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .copy h2 {
        font-size: clamp(1.65rem, 3.2vw, 3.1rem);
      }

      .copy p {
        max-width: 760px;
        color: var(--muted);
        font-size: clamp(0.9rem, 1.02vw, 1rem);
        line-height: 1.5;
      }

      .arabic-invocation {
        max-width: 900px;
        margin: 0 auto 8px;
        color: #fff7d6;
        font-family: "Traditional Arabic", "Amiri", "Scheherazade New", serif;
        font-size: clamp(2rem, 3.8vw, 4.5rem);
        font-weight: 800;
        line-height: 1.18;
        text-align: center;
        direction: rtl;
      }

      .home-translation {
        display: block;
        margin-top: 6px;
        color: #ffe7a3;
        font-size: clamp(0.98rem, 1.25vw, 1.36rem);
        font-weight: 850;
        line-height: 1.45;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 22px;
      }

      .tags span {
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        padding: 9px 12px;
        color: white;
        font-weight: 850;
      }

      .media-frame {
        position: relative;
        justify-self: center;
        overflow: hidden;
        width: min(100%, 390px);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: #020d0a;
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.34);
      }

      .media-frame.portrait {
        aspect-ratio: 9 / 16;
        max-height: min(48dvh, 520px);
      }

      .media-frame.landscape {
        width: min(100%, 780px);
        aspect-ratio: 16 / 9;
      }

      .media-frame.logo {
        width: min(220px, 36vw);
        aspect-ratio: 1;
        background: rgba(255, 255, 255, 0.06);
      }

      .media-frame img,
      .media-frame video {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
      }

      .media-frame.logo img {
        object-fit: cover;
      }

      .countdown-box {
        display: grid;
        justify-items: center;
        gap: 4px;
        width: min(360px, 100%);
        margin: 14px auto 0;
        border: 1px solid rgba(201, 154, 53, 0.42);
        border-radius: 8px;
        background: rgba(201, 154, 53, 0.12);
        padding: clamp(9px, 1.3vw, 14px);
      }

      body.home-display .countdown-box {
        margin-bottom: 0;
      }

      .countdown-box span {
        color: #ffe7a3;
        font-size: 0.76rem;
        font-weight: 950;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .countdown-box strong {
        color: white;
        font-size: clamp(2rem, 4.2vw, 3.8rem);
        line-height: 0.9;
        font-variant-numeric: tabular-nums;
      }

      .controls {
        display: flex;
        flex-wrap: nowrap;
        gap: 8px;
        min-width: 0;
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 2px;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.34) transparent;
      }

      .controls button,
      .controls a {
        flex: 0 0 auto;
        min-height: 34px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        padding: 7px 11px;
        text-decoration: none;
        font: inherit;
        font-weight: 900;
        font-size: 0.84rem;
        cursor: pointer;
      }

      body.display-view .copy h1,
      body.display-view .copy h2,
      body.public-mode .copy h1,
      body.public-mode .copy h2 {
        font-size: clamp(2.4rem, 5.4vw, 6rem);
      }

      body.display-view.home-display .copy h1,
      body.public-mode.home-display .copy h1 {
        font-size: clamp(2.8rem, 4.9vw, 5.8rem);
      }

      body.display-view .copy h2,
      body.public-mode .copy h2 {
        font-size: clamp(2rem, 4.6vw, 4.8rem);
      }

      body.display-view .media-frame,
      body.public-mode .media-frame {
        width: min(100%, 520px);
      }

      body.display-view .media-frame.portrait,
      body.public-mode .media-frame.portrait {
        max-height: min(78svh, 820px);
      }

      body.display-view .media-frame.logo,
      body.public-mode .media-frame.logo {
        width: min(340px, 46vw);
      }

      .controls button:hover,
      .controls a:hover {
        background: white;
        color: var(--green);
      }

      .blackout {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        place-items: center;
        background: #000;
        color: rgba(255, 255, 255, 0.5);
        font-weight: 900;
      }

      @media (max-width: 980px) {
        body {
          overflow: auto;
        }

        .stage {
          min-height: 100vh;
        }

        .workspace,
        .screen {
          grid-template-columns: 1fr;
        }

        .topbar,
        .bottombar {
          align-items: flex-start;
          flex-direction: column;
        }

        .media-frame.portrait {
          max-height: none;
        }

        body.home-display .screen {
          padding: 24px 16px;
        }

        body.home-display .copy h1 {
          font-size: clamp(2.4rem, 12vw, 4.8rem);
        }

        .home-logo {
          width: 70px;
          height: 70px;
        }

        .arabic-invocation {
          font-size: clamp(2rem, 12vw, 4.2rem);
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <header class="topbar">
        <div class="brand">
          <img src="assets/logo.jpg" alt="Logo ASAA" />
          <div>
            <strong>ASAA Officiel</strong>
            <span>Finale du Quiz Islamique 2026</span>
          </div>
        </div>
        <div class="status" data-status>Accueil</div>
      </header>

      <section class="workspace">
        <aside class="panel sidebar" aria-label="Commandes de projection">
          <button class="category-button is-active" type="button" data-category="home">
            <strong>Accueil</strong>
            <span>Écran d’attente et compte à rebours</span>
          </button>
          <button class="category-button" type="button" data-category="opening">
            <strong>Ouverture</strong>
            <span>Lancement officiel</span>
          </button>
          <button class="category-button" type="button" data-category="pause">
            <strong>Pause</strong>
            <span>Attente technique ou transition</span>
          </button>
          <button class="category-button" type="button" data-category="candidateCards">
            <strong>Cartons candidats</strong>
            <span>Annonce avant passage</span>
          </button>
          <button class="category-button" type="button" data-category="finalistVideos">
            <strong>Vidéos des finalistes</strong>
            <span>Lecture contrôlée par la régie</span>
          </button>
          <button class="category-button" type="button" data-category="finalistPhotos">
            <strong>Photos des finalistes</strong>
            <span>Portraits officiels</span>
          </button>
          <button class="category-button" type="button" data-category="finalistPosters">
            <strong>Affiches officielles</strong>
            <span>Supports de communication</span>
          </button>
          <button class="category-button" type="button" data-category="winners">
            <strong>Anciens vainqueurs</strong>
            <span>Éditions précédentes</span>
          </button>
          <button class="category-button" type="button" data-category="qr">
            <strong>QR Audience</strong>
            <span>Enregistrement du public</span>
          </button>
          <button class="category-button" type="button" data-category="resultsPending">
            <strong>Résultats</strong>
            <span>Délibération en cours</span>
          </button>
          <button class="category-button" type="button" data-category="thanks">
            <strong>Remerciements</strong>
            <span>Bénévoles, soutiens et public</span>
          </button>
          <div class="preview-box" aria-live="polite">
            <div class="preview-item"><span>À l’écran</span><strong data-current-preview>Accueil</strong></div>
            <div class="preview-item"><span>Sortie publique</span><strong data-public-preview>Accueil</strong></div>
            <div class="preview-item"><span>Suivant</span><strong data-next-preview>Prêt</strong></div>
            <div class="preview-item"><span>À venir</span><ul class="upcoming-list" data-upcoming-list></ul></div>
            <div class="tech-status" data-tech-status></div>
          </div>
        </aside>

        <section class="panel screen" data-screen></section>
      </section>

      <footer class="bottombar">
        <div class="controls">
          <button type="button" data-prev>Précédent</button>
          <button type="button" data-next>Suivant</button>
          <button type="button" data-home>Accueil</button>
          <button type="button" data-back>Retour</button>
          <button type="button" data-play>Lire</button>
          <button type="button" data-stop>Stop</button>
          <button type="button" data-black>Écran noir</button>
          <button type="button" data-public>Écran public</button>
          <button type="button" data-open-display>Ouvrir projecteur</button>
          <button type="button" data-test-display>Test projecteur</button>
          <button type="button" data-next-poster>Affiche suivante</button>
          <button type="button" data-day-mode>Jour J</button>
          <button type="button" data-preload>Précharger</button>
          <button type="button" data-test-media>Test médias</button>
          <button type="button" data-countdown-start="10">10 min</button>
          <button type="button" data-countdown-start="5">5 min</button>
          <button type="button" data-countdown-start="1">1 min</button>
          <button type="button" data-fullscreen>Plein écran</button>
        </div>
        <div class="controls">
          <a href="regie-qi26.html">Régie</a>
          <a href="audience-dashboard-qi26.html">Dashboard</a>
          <a href="verification-medias-qi26.html">Médias</a>
        </div>
      </footer>
      <div class="blackout">Écran noir</div>
    </main>

    <script>
      const screen = document.querySelector('[data-screen]');
      const statusLabel = document.querySelector('[data-status]');
      const categoryButtons = Array.from(document.querySelectorAll('[data-category]'));
      const playButton = document.querySelector('[data-play]');
      const currentPreview = document.querySelector('[data-current-preview]');
      const publicPreview = document.querySelector('[data-public-preview]');
      const nextPreview = document.querySelector('[data-next-preview]');
      const upcomingList = document.querySelector('[data-upcoming-list]');
      const techStatus = document.querySelector('[data-tech-status]');
      const params = new URLSearchParams(window.location.search);
      const displayMode = params.get('view') === 'public';
      const requestedCategory = params.get('category');
      const requestedIndex = Number.parseInt(params.get('index') || '', 10);
      const channel = 'BroadcastChannel' in window ? new BroadcastChannel('asaa-qi26-projection') : null;
      const stateKey = 'asaa_qi26_projection_state';
      const imageCache = new Map();
      const videoCache = new Map();
      const collections = {
        home: [
          {
            type: 'home',
            kicker: 'Finale du Quiz Islamique 2026',
            arabic: 'بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيمِ<br>رَبِّ زِدْنِي عِلْمًا',
            translation: 'Au nom d’Allah, le Tout Miséricordieux, le Très Miséricordieux. Seigneur, augmente-nous en science.',
            title: 'Bienvenue à la finale',
            text: 'Merci de vous installer dans le calme. Qu’Allah accorde la bénédiction à cette rencontre, aux candidats, aux familles et à toute l’équipe ASAA.',
            tags: ['Science utile', 'Respect', 'Excellence']
          }
        ],
        opening: [
          {
            type: 'card',
            kicker: 'Bismillah',
            title: 'Finale du Quiz Islamique 2026',
            text: 'Au nom d’Allah, nous ouvrons cette rencontre dédiée à la science, à l’effort et au bon comportement.',
            tags: ['ASAA Officiel', 'Ouverture', 'QI26']
          }
        ],
        pause: [
          {
            type: 'pause',
            kicker: 'ASAA Officiel',
            title: 'Veuillez patienter',
            text: 'La régie prépare la suite du programme. Merci de rester installés dans le calme.',
            tags: ['Pause technique', 'QI26', 'ASAA']
          }
        ],
        candidateCards: [
          { type: 'card', title: 'Kouyaté Amara', text: 'Finaliste du Quiz Islamique 2026.', tags: ['Finaliste QI26', 'ASAA Officiel'] },
          { type: 'card', title: 'Sidibé Mohamed', text: 'Finaliste du Quiz Islamique 2026.', tags: ['Finaliste QI26', 'ASAA Officiel'] },
          { type: 'card', title: 'Kouyaté Fatoumata Ramadan', text: 'Finaliste du Quiz Islamique 2026.', tags: ['Finaliste QI26', 'ASAA Officiel'] },
          { type: 'card', title: 'Sib Abdoulaye', text: 'Finaliste du Quiz Islamique 2026.', tags: ['Finaliste QI26', 'ASAA Officiel'] },
          { type: 'card', title: 'Sayore Nassiratou', text: 'Finaliste du Quiz Islamique 2026.', tags: ['Finaliste QI26', 'ASAA Officiel'] },
          { type: 'card', title: 'Kokora Mohamed Ouattara', text: 'Finaliste du Quiz Islamique 2026.', tags: ['Finaliste QI26', 'ASAA Officiel'] },
          { type: 'card', title: 'Traoré Mouhammad Aboubakr', text: 'Finaliste du Quiz Islamique 2026.', tags: ['Finaliste QI26', 'ASAA Officiel'] }
        ],
        finalistVideos: [
          { type: 'video', title: 'Kouyaté Amara', text: 'Port-Bouët. Finaliste du Quiz Islamique 2026.', src: 'assets/finalistes/kouyate-amara-video.mp4', poster: 'assets/finalistes/kouyate-amara-photo.jpeg' },
          { type: 'video', title: 'Sidibé Mohamed', text: 'Yopougon. Finaliste du Quiz Islamique 2026.', src: 'assets/finalistes/sidibe-mohamed-video.mp4', poster: 'assets/finalistes/sidibe-mohamed-photo.jpeg' },
          { type: 'video', title: 'Kouyaté Fatoumata Ramadan', text: 'Adjamé. Finaliste du Quiz Islamique 2026.', src: 'assets/finalistes/kouyate-fatoumata-ramadan-video.mp4', poster: 'assets/finalistes/kouyate-fatoumata-ramadan-photo.jpeg' },
          { type: 'video', title: 'Sib Abdoulaye', text: 'Cocody. Finaliste du Quiz Islamique 2026.', src: 'assets/finalistes/sib-abdoulaye-video.mp4', poster: 'assets/finalistes/sib-abdoulaye-photo.jpeg' },
          { type: 'video', title: 'Sayore Nassiratou', text: 'Plateau. Finaliste du Quiz Islamique 2026.', src: 'assets/finalistes/sayore-nassiratou-video.mp4', poster: 'assets/finalistes/sayore-nassiratou-photo.jpeg' }
        ],
        finalistPhotos: [
          { type: 'image', title: 'Kouyaté Amara', text: 'Photo officielle.', src: 'assets/finalistes/kouyate-amara-photo.jpeg', fit: 'portrait' },
          { type: 'image', title: 'Sidibé Mohamed', text: 'Photo officielle.', src: 'assets/finalistes/sidibe-mohamed-photo.jpeg', fit: 'portrait' },
          { type: 'image', title: 'Kouyaté Fatoumata Ramadan', text: 'Photo officielle.', src: 'assets/finalistes/kouyate-fatoumata-ramadan-photo.jpeg', fit: 'portrait' },
          { type: 'image', title: 'Sib Abdoulaye', text: 'Photo officielle.', src: 'assets/finalistes/sib-abdoulaye-photo.jpeg', fit: 'portrait' },
          { type: 'image', title: 'Sayore Nassiratou', text: 'Photo officielle.', src: 'assets/finalistes/sayore-nassiratou-photo.jpeg', fit: 'portrait' },
          { type: 'image', title: 'Kokora Mohamed Ouattara', text: 'Photo officielle.', src: 'assets/finalistes/kokora-mohamed-ouattara-photo.jpeg', fit: 'portrait' },
          { type: 'image', title: 'Traoré Mouhammad Aboubakr', text: 'Photo officielle.', src: 'assets/finalistes/traore-mouhammad-aboubakr-photo.jpeg', fit: 'portrait' }
        ],
        finalistPosters: [
          { type: 'image', title: 'Kouyaté Amara', text: 'Affiche officielle QI26.', src: 'assets/finalistes/kouyate-amara-affiche.png', fit: 'portrait' },
          { type: 'image', title: 'Sidibé Mohamed', text: 'Affiche officielle QI26.', src: 'assets/finalistes/sidibe-mohamed-affiche.jpeg', fit: 'portrait' },
          { type: 'image', title: 'Kouyaté Fatoumata Ramadan', text: 'Affiche officielle QI26.', src: 'assets/finalistes/kouyate-fatoumata-ramadan-affiche.jpeg', fit: 'portrait' },
          { type: 'image', title: 'Sib Abdoulaye', text: 'Affiche officielle QI26.', src: 'assets/finalistes/sib-abdoulaye-affiche.jpeg', fit: 'portrait' },
          { type: 'image', title: 'Sayore Nassiratou', text: 'Affiche officielle QI26.', src: 'assets/finalistes/sayore-nassiratou-affiche.jpeg', fit: 'portrait' },
          { type: 'image', title: 'Kokora Mohamed Ouattara', text: 'Affiche officielle QI26.', src: 'assets/finalistes/kokora-mohamed-ouattara-affiche.jpeg', fit: 'portrait' },
          { type: 'image', title: 'Traoré Mouhammad Aboubakr', text: 'Affiche officielle QI26.', src: 'assets/finalistes/traore-mouhammad-aboubakr-affiche.jpeg', fit: 'portrait' }
        ],
        winners: [
          { type: 'video', title: 'Amina Ouattara', text: 'Vainqueure de l’édition 2023.', src: 'assets/anciens-vainqueurs/amina-ouattara-vainqueur-qi23-video.mp4' },
          { type: 'video', title: 'Bamba Moriba', text: 'Vainqueur de l’édition 2025.', src: 'assets/anciens-vainqueurs/bamba-moriba-vainqueur-qi25-video.mp4', poster: 'assets/anciens-vainqueurs/bamba-moriba-photo.jpg' },
          { type: 'image', title: 'Bamba Moriba', text: 'Vainqueur de l’édition 2025.', src: 'assets/anciens-vainqueurs/bamba-moriba-photo.jpg', fit: 'portrait' }
        ],
        qr: [
          {
            type: 'qr',
            kicker: 'Audience QI26',
            title: 'Enregistrer la présence',
            text: 'Scanner le QR code pour enregistrer sa présence et aider l’équipe à suivre la participation du public.',
            tags: ['Formulaire public', 'Comptage live', 'ASAA']
          }
        ],
        resultsPending: [
          {
            type: 'card',
            kicker: 'Délibération',
            title: 'Résultats en préparation',
            text: 'Le jury vérifie les éléments finaux. Merci de patienter dans le calme.',
            tags: ['Jury', 'Résultats', 'QI26']
          }
        ],
        thanks: [
          {
            type: 'logo',
            kicker: 'Remerciements',
            title: 'Merci à toutes les équipes',
            text: 'Qu’Allah récompense les bénévoles, les soutiens, les familles, les candidats et le public pour leur participation.',
            tags: ['Service', 'Discipline', 'Communauté']
          }
        ]
      };
      const labels = {
        home: 'Accueil',
        opening: 'Ouverture',
        pause: 'Pause',
        candidateCards: 'Cartons candidats',
        finalistVideos: 'Vidéos des finalistes',
        finalistPhotos: 'Photos des finalistes',
        finalistPosters: 'Affiches officielles',
        winners: 'Anciens vainqueurs',
        qr: 'QR Audience',
        resultsPending: 'Résultats en attente',
        thanks: 'Remerciements'
      };
      const posterByTitle = new Map(collections.finalistPosters.map((item) => [item.title, item]));
      let projectorPosterIndex = 0;
      let activeCategory = 'home';
      let activeIndex = 0;
      let countdownTimer = null;
      let countdownRemaining = 600;
      let blackScreen = false;

      if (displayMode) {
        document.body.classList.add('display-view');
      }

      function escapeHtml(value) {
        return String(value || '').replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        })[char]);
      }

      function stopMedia() {
        screen.querySelectorAll('video').forEach((video) => {
          video.pause();
          video.muted = false;
          video.currentTime = 0;
        });
      }

      function preloadImage(src) {
        if (!src || imageCache.has(src)) return imageCache.get(src);
        const task = new Promise((resolve) => {
          const image = new Image();
          image.decoding = 'async';
          image.onload = () => {
            image.decode?.().catch(() => undefined).finally(resolve);
          };
          image.onerror = resolve;
          image.src = src;
        });
        imageCache.set(src, task);
        return task;
      }

      function preloadVideo(src) {
        if (!src || videoCache.has(src)) return videoCache.get(src);
        const video = document.createElement('video');
        video.preload = 'auto';
        video.muted = true;
        video.playsInline = true;
        video.src = src;
        video.style.position = 'fixed';
        video.style.width = '1px';
        video.style.height = '1px';
        video.style.opacity = '0';
        video.style.pointerEvents = 'none';
        video.style.left = '-9999px';
        video.addEventListener('canplaythrough', () => video.pause(), { once: true });
        document.body.appendChild(video);
        video.load();
        videoCache.set(src, video);
        return video;
      }

      function warmItem(item) {
        if (!item) return;
        if (item.poster) preloadImage(item.poster);
        if (item.type === 'image') preloadImage(item.src);
        if (item.type === 'video') preloadVideo(item.src);
      }

      function warmCurrentCategory() {
        const items = collections[activeCategory] || [];
        if (!items.length) return;
        warmItem(items[activeIndex]);
        warmItem(items[(activeIndex + 1) % items.length]);
        warmItem(items[(activeIndex + 2) % items.length]);
      }

      function warmProjectionAssets() {
        Object.values(collections).flat().forEach((item) => {
          if (item?.poster) preloadImage(item.poster);
          if (item?.type === 'image') preloadImage(item.src);
        });

        const videos = Object.values(collections).flat().filter((item) => item?.type === 'video');
        let index = 0;
        const warmNextVideo = () => {
          const item = videos[index];
          if (!item) return;
          preloadVideo(item.src);
          index += 1;
          window.setTimeout(warmNextVideo, 450);
        };
        warmNextVideo();
      }

      function getAssetUrls() {
        const urls = new Set(['assets/logo.jpg']);
        Object.values(collections).flat().forEach((item) => {
          if (item?.src && (item.type === 'image' || item.type === 'video')) urls.add(item.src);
          if (item?.poster) urls.add(item.poster);
        });
        return Array.from(urls);
      }

      async function testProjectionAssets() {
        const urls = getAssetUrls();
        if (techStatus) techStatus.textContent = `Test médias : 0 / ${urls.length}`;
        let ok = 0;
        for (const url of urls) {
          try {
            const response = await fetch(url, { method: 'HEAD', cache: 'no-cache' });
            if (!response.ok) throw new Error(String(response.status));
            ok += 1;
          } catch {
            if (techStatus) techStatus.textContent = `Média à vérifier : ${url}`;
            return false;
          }
          if (techStatus) techStatus.textContent = `Test médias : ${ok} / ${urls.length}`;
        }
        if (techStatus) techStatus.textContent = 'Médias prêts';
        return true;
      }

      function renderTags(tags = []) {
        return tags.length ? `<div class="tags">${tags.map((tag) => `<span>${escapeHtml(tag)}</span>`).join('')}</div>` : '';
      }

      function renderMedia(item) {
        if (item.type === 'home') return '';
        if (item.type === 'video') {
          const videoControls = displayMode ? '' : 'controls';
          return `<div class="media-frame portrait"><video src="${escapeHtml(item.src)}" ${item.poster ? `poster="${escapeHtml(item.poster)}"` : ''} ${videoControls} playsinline preload="auto"></video></div>`;
        }
        if (item.type === 'image') {
          return `<div class="media-frame ${item.fit === 'landscape' ? 'landscape' : 'portrait'}"><img src="${escapeHtml(item.src)}" alt="${escapeHtml(item.title)}" /></div>`;
        }
        if (item.type === 'qr') {
          return `<div class="media-frame logo"><img src="https://api.qrserver.com/v1/create-qr-code/?size=520x520&margin=14&data=https%3A%2F%2Fasaaofficiel.vercel.app%2Faudience-qi26.html" alt="QR code Audience QI26" /></div>`;
        }
        if (item.type === 'card' || item.type === 'pause') return '';
        return `<div class="media-frame logo"><img src="assets/logo.jpg" alt="Logo ASAA" /></div>`;
      }

      function sendProjectorState(state, target = 'asaa_qi26_public_projection') {
        const url = new URL(window.location.href);
        url.searchParams.set('view', 'public');
        url.searchParams.set('category', state.activeCategory);
        url.searchParams.set('index', String(state.activeIndex));
        localStorage.setItem(stateKey, JSON.stringify(state));
        channel?.postMessage(state);
        window.open(url.toString(), target, 'noopener');
      }

      function resolveDisplayItem(item) {
        if (!item) return item;
        if ((displayMode || document.body.classList.contains('public-mode')) && activeCategory === 'finalistPhotos') {
          const poster = posterByTitle.get(item.title);
          if (poster) return poster;
        }
        return item;
      }

      function renderCountdown() {
        const countdown = document.querySelector('[data-countdown]');
        if (!countdown) return;
        const minutes = Math.floor(countdownRemaining / 60);
        const seconds = countdownRemaining % 60;
        countdown.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      }

      function render() {
        stopMedia();
        document.body.classList.toggle('black-screen', blackScreen);
        const items = collections[activeCategory] || [];
        const item = items[activeIndex] || items[0];
        const displayItem = resolveDisplayItem(item);
        const counter = items.length > 1 ? `${activeIndex + 1} / ${items.length}` : 'Prêt';
        if (statusLabel) statusLabel.textContent = `${labels[activeCategory]} · ${counter}`;
        const nextItem = items.length > 1 ? items[(activeIndex + 1) % items.length] : null;
        if (currentPreview) currentPreview.textContent = item?.title || labels[activeCategory] || 'Accueil';
        if (publicPreview) publicPreview.textContent = displayItem?.title ? `${displayItem.title} · ${displayItem.type === 'image' ? 'Affiche' : labels[activeCategory]}` : labels[activeCategory];
        if (nextPreview) nextPreview.textContent = nextItem?.title || 'Prêt';
        if (upcomingList) {
          upcomingList.innerHTML = items.length > 1
            ? [1, 2, 3].map((step) => `<li>${escapeHtml(items[(activeIndex + step) % items.length]?.title || '')}</li>`).join('')
            : '<li>Prêt</li>';
        }
        categoryButtons.forEach((button) => button.classList.toggle('is-active', button.dataset.category === activeCategory));
        const projectPoster = (displayMode || document.body.classList.contains('public-mode')) && ['finalistPhotos', 'finalistPosters'].includes(activeCategory);
        document.body.classList.toggle('card-display', displayItem.type === 'card' || displayItem.type === 'pause');
        document.body.classList.toggle('poster-display', projectPoster);
        document.body.classList.toggle('home-display', displayItem.type === 'home');
        const kicker = displayItem.kicker || (projectPoster ? labels.finalistPosters : labels[activeCategory]);
        const titleTag = displayItem.type === 'home' ? 'h1' : 'h2';
        const homeIntro = displayItem.type === 'home'
          ? `<img class="home-logo" src="assets/logo.jpg" alt="Logo ASAA" />${displayItem.arabic ? `<div class="arabic-invocation">${displayItem.arabic}</div>` : ''}${displayItem.translation ? `<span class="home-translation">${escapeHtml(displayItem.translation)}</span>` : ''}`
          : '';
        const extra = displayItem.type === 'home'
          ? `<div class="countdown-box" aria-live="polite"><span>Compte à rebours</span><strong data-countdown>10:00</strong></div>`
          : '';
        screen.innerHTML = `
          <div class="copy">
            <span class="kicker">${escapeHtml(kicker)}</span>
            ${homeIntro}
            <${titleTag}>${escapeHtml(displayItem.title)}</${titleTag}>
            <p>${escapeHtml(displayItem.text)}</p>
            ${extra}
            ${renderTags(displayItem.tags || ['Finale QI26', 'ASAA Officiel'])}
          </div>
          ${renderMedia(displayItem)}
        `;
        renderCountdown();
        warmItem(displayItem);
        warmCurrentCategory();
        if (playButton) playButton.disabled = displayItem.type !== 'video';
      }

      function setCategory(category) {
        if (!collections[category]) return;
        stopMedia();
        activeCategory = category;
        activeIndex = 0;
        blackScreen = false;
        render();
        publishState();
      }

      function move(step) {
        const items = collections[activeCategory] || [];
        if (!items.length) return;
        stopMedia();
        activeIndex = (activeIndex + step + items.length) % items.length;
        blackScreen = false;
        render();
        publishState();
      }

      function startCountdown(minutes) {
        window.clearInterval(countdownTimer);
        countdownRemaining = Math.max(0, Math.round(Number(minutes || 0) * 60));
        renderCountdown();
        publishState();
        countdownTimer = window.setInterval(() => {
          countdownRemaining = Math.max(0, countdownRemaining - 1);
          renderCountdown();
          publishState();
          if (countdownRemaining === 0) window.clearInterval(countdownTimer);
        }, 1000);
      }

      function getState() {
        return { activeCategory, activeIndex, blackScreen, countdownRemaining };
      }

      function applyState(state = {}) {
        if (state.activeCategory && collections[state.activeCategory]) activeCategory = state.activeCategory;
        if (Number.isInteger(state.activeIndex)) activeIndex = state.activeIndex;
        if (typeof state.blackScreen === 'boolean') blackScreen = state.blackScreen;
        if (Number.isFinite(state.countdownRemaining)) countdownRemaining = Math.max(0, Number(state.countdownRemaining));
        render();
      }

      function applyUrlState() {
        if (requestedCategory && collections[requestedCategory]) activeCategory = requestedCategory;
        if (Number.isInteger(requestedIndex) && requestedIndex >= 0) activeIndex = requestedIndex;
      }

      function publishState() {
        if (displayMode) return;
        const state = getState();
        localStorage.setItem(stateKey, JSON.stringify(state));
        channel?.postMessage(state);
      }

      function publishCommand(command) {
        if (displayMode) return;
        channel?.postMessage({ command, state: getState() });
      }

      categoryButtons.forEach((button) => {
        button.addEventListener('click', () => setCategory(button.dataset.category));
      });
      document.querySelector('[data-prev]')?.addEventListener('click', () => move(-1));
      document.querySelector('[data-next]')?.addEventListener('click', () => move(1));
      document.querySelector('[data-home]')?.addEventListener('click', () => setCategory('home'));
      document.querySelector('[data-back]')?.addEventListener('click', () => {
        window.location.href = 'regie-qi26.html';
      });
      document.querySelector('[data-play]')?.addEventListener('click', () => {
        const video = screen.querySelector('video');
        if (video) video.play().catch(() => {});
        publishCommand('play');
      });
      document.querySelector('[data-stop]')?.addEventListener('click', () => {
        stopMedia();
        publishCommand('stop');
      });
      document.querySelector('[data-black]')?.addEventListener('click', () => {
        stopMedia();
        blackScreen = !blackScreen;
        render();
        publishState();
      });
      document.querySelector('[data-public]')?.addEventListener('click', () => {
        document.body.classList.toggle('public-mode');
        render();
      });
      document.querySelector('[data-open-display]')?.addEventListener('click', () => {
        sendProjectorState(getState());
        publishState();
      });
      document.querySelector('[data-test-display]')?.addEventListener('click', () => {
        sendProjectorState({ ...getState(), activeCategory: 'finalistPosters', activeIndex: 0 }, 'asaa_qi26_public_projection_test');
      });
      document.querySelector('[data-next-poster]')?.addEventListener('click', () => {
        const posters = collections.finalistPosters || [];
        if (!posters.length) return;
        const activeTitle = collections[activeCategory]?.[activeIndex]?.title;
        const currentPosterIndex = posters.findIndex((item) => item.title === activeTitle);
        projectorPosterIndex = currentPosterIndex >= 0 ? currentPosterIndex + 1 : projectorPosterIndex + 1;
        projectorPosterIndex = projectorPosterIndex % posters.length;
        sendProjectorState({ ...getState(), activeCategory: 'finalistPosters', activeIndex: projectorPosterIndex });
        if (techStatus) techStatus.textContent = `Projecteur : ${posters[projectorPosterIndex].title}`;
      });
      document.querySelector('[data-day-mode]')?.addEventListener('click', () => {
        document.body.classList.toggle('day-mode');
        const enabled = document.body.classList.contains('day-mode');
        document.querySelector('[data-day-mode]').textContent = enabled ? 'Régie complète' : 'Jour J';
        try {
          localStorage.setItem('asaa_qi26_projection_day_mode', enabled ? '1' : '0');
        } catch {}
      });
      document.querySelector('[data-preload]')?.addEventListener('click', () => {
        warmProjectionAssets();
        if (techStatus) techStatus.textContent = 'Préchargement lancé';
      });
      document.querySelector('[data-test-media]')?.addEventListener('click', () => {
        warmProjectionAssets();
        testProjectionAssets();
      });
      document.querySelectorAll('[data-countdown-start]').forEach((button) => {
        button.addEventListener('click', () => startCountdown(button.dataset.countdownStart));
      });
      document.querySelector('[data-fullscreen]')?.addEventListener('click', () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
        else document.exitFullscreen?.();
      });
      screen.addEventListener('click', () => {
        if (displayMode && !document.fullscreenElement) document.documentElement.requestFullscreen?.();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'ArrowRight') move(1);
        if (event.key === 'ArrowLeft') move(-1);
        if (event.key === 'Escape') {
          document.body.classList.remove('public-mode');
          blackScreen = false;
          render();
          publishState();
        }
        if (event.key.toLowerCase() === 'b') {
          stopMedia();
          blackScreen = !blackScreen;
          render();
          publishState();
        }
        if (event.key.toLowerCase() === 'h') setCategory('home');
        if (event.key.toLowerCase() === 'o') setCategory('opening');
        if (event.key.toLowerCase() === 'p') setCategory('pause');
        if (event.key.toLowerCase() === 'r') setCategory('resultsPending');
        if (event.key.toLowerCase() === 'a') setCategory('finalistPosters');
        if (event.key.toLowerCase() === 'c') setCategory('candidateCards');
        if (event.key.toLowerCase() === 'v') setCategory('finalistVideos');
        if (event.key.toLowerCase() === 'f') document.querySelector('[data-fullscreen]')?.click();
        if (event.key === ' ') {
          event.preventDefault();
          document.querySelector('[data-play]')?.click();
        }
      });

      channel?.addEventListener('message', (event) => {
        if (!displayMode) return;
        const payload = event.data || {};
        applyState(payload.state || payload);
        if (payload.command === 'play') screen.querySelector('video')?.play().catch(() => {});
        if (payload.command === 'stop') stopMedia();
      });
      window.addEventListener('storage', (event) => {
        if (!displayMode || event.key !== stateKey || !event.newValue) return;
        try {
          applyState(JSON.parse(event.newValue));
        } catch {}
      });
      if (displayMode) {
        try {
          const saved = JSON.parse(localStorage.getItem(stateKey) || '{}');
          applyState(saved);
          applyUrlState();
          render();
        } catch {
          applyUrlState();
          render();
        }
      } else {
        render();
        publishState();
      }
      try {
        if (!displayMode && localStorage.getItem('asaa_qi26_projection_day_mode') === '1') {
          document.querySelector('[data-day-mode]')?.click();
        }
      } catch {}
      window.setTimeout(warmProjectionAssets, 250);
    </script>
  </body>
